<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UniVoice | Audience Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at bottom left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* --- Floating Hotstar-style Eye Counter --- */
        .floating-eye {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: default;
        }
        .eye-icon {
            font-size: 1.2rem;
        }
        .eye-count {
            font-size: 0.9rem;
            font-weight: 800;
            color: white;
            background: #ef4444;
            padding: 2px 8px;
            border-radius: 20px;
            line-height: 1.2;
        }
        .eye-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        /* --- Elite UniVoice Branding & Info --- */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        .custom-logo-mini {
            position: relative; width: 70px; height: 65px; margin-bottom: 8px;
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.3));
        }
        .logo-shape-1 {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s ease-in-out infinite alternate;
        }
        .logo-shape-2 {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
            background: #d4af37; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .tagline-top {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        h2 { color: #fff; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; margin: 5px 0; }

        /* --- Main Interaction Frame --- */
        .golden-frame {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 45px;
            padding: 30px 25px;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6);
        }

        .session-info { 
            text-align: center; background: rgba(15, 23, 42, 0.6); 
            padding: 14px; border-radius: 22px; margin-bottom: 20px; 
            font-size: 0.9rem; color: #d4af37; font-weight: 600; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-card { 
            background: rgba(34, 197, 94, 0.08); border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 18px; border-radius: 28px; text-align: center; margin-bottom: 20px; 
        }
        .timer-display { font-size: 1.6rem; font-weight: 800; color: #22c55e; margin-top: 5px; text-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .timer-display.critical { color: #ef4444; animation: pulse 1s infinite; }

        .btn-request { 
            width: 100%; background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); 
            color: white; border: none; padding: 18px; border-radius: 28px; 
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 12px 25px rgba(211, 84, 0, 0.3);
        }
        .btn-request:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(211, 84, 0, 0.4); }
        .btn-request:active { transform: scale(0.98); }
        .btn-request:disabled { background: #475569; box-shadow: none; opacity: 0.6; cursor: not-allowed; }

        /* Emoji picker: wrap + smaller on mobile */
        .emoji-picker { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin: 25px 0; 
        }
        .emoji-btn { 
            font-size: 1.6rem; 
            cursor: pointer; 
            background: rgba(255,255,255,0.05); 
            padding: 10px 16px; 
            border-radius: 22px; 
            transition: 0.2s; 
            border: 1px solid rgba(255,255,255,0.08);
        }
        .emoji-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

        /* --- Translation UI (simplified, always to English) --- */
        .translation-panel {
            margin: 20px 0 10px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .lang-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .lang-selector select {
            background: #0f172a;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #334155;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            flex: 1;
        }
        .btn-translate-toggle {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.2s;
        }
        .btn-translate-toggle.active {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .translation-status {
            font-size: 0.7rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 8px;
        }
        .translation-status.active {
            color: #22c55e;
        }

        .message-area { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .message-area input { 
            flex: 1; padding: 14px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.7); color: white; outline: none; font-size: 0.9rem;
        }
        .message-area button { 
            background: #3498db; color: white; border: none; padding: 0 25px; 
            border-radius: 25px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .message-area button:hover { background: #2980b9; }

        /* Poll UI */
        .poll-container { margin-top: 15px; }
        .poll-bar-row { margin: 15px 0; }
        .poll-info { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
        .poll-track { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .poll-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-yes { background: #22c55e; }
        .fill-no { background: #ef4444; }

        /* Modals */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.92); z-index: 2000; align-items: flex-end; 
            justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: #1e293b; border-radius: 45px 45px 0 0; padding: 30px 25px; 
            width: 100%; max-width: 550px; text-align: center; border-top: 4px solid #d4af37;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
        }
        .poll-option { display: block; width: 100%; margin: 10px 0; padding: 15px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .poll-option:hover { background: #d4af37; color: #0f172a; }
        .btn-dismiss { background: transparent; color: #94a3b8; border: none; margin-top: 15px; font-weight: 600; cursor: pointer; text-decoration: underline; }

        /* Animations */
        @keyframes morph { 0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 50% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; } 100% { border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Responsive for mobile */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .golden-frame { padding: 20px 15px; }
            .emoji-btn { font-size: 1.3rem; padding: 6px 12px; }
            .btn-request { padding: 15px; font-size: 0.9rem; }
            .message-area button { padding: 0 18px; }
            h2 { font-size: 1.5rem; }
            .poll-option { padding: 12px; font-size: 0.9rem; }
            .floating-eye { top: 10px; right: 10px; padding: 5px 10px; }
            .eye-count { font-size: 0.8rem; padding: 1px 6px; }
            .lang-selector { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <!-- Floating Eye Counter -->
    <div class="floating-eye">
        <span class="eye-icon">👁️</span>
        <span class="eye-count" id="pCount">0</span>
        <span class="eye-label">live</span>
    </div>

    <header class="brand-header">
        <div class="custom-logo-mini"><div class="logo-shape-1"></div><div class="logo-shape-2">🎙️</div></div>
        <p class="tagline-top">Crafted for voice that matters</p>
        <h2>Audience Hub</h2>
    </header>

    <div class="golden-frame" id="mainUi">
        <div class="session-info" id="sessionTopicDisplay">Establishing SRb Secure Connection...</div>
        
        <div class="status-card" id="speakerStatus">
            <div style="font-weight: 600; opacity: 0.7; font-size: 0.75rem; letter-spacing: 1px;">🎤 TRANSMISSION STATUS</div>
            <div id="speakerTimer" class="timer-display">Offline</div>
        </div>

        <button id="requestSpeakBtn" class="btn-request">🎙️ Request to Speak</button>

        <!-- Translation Panel -->
        <div class="translation-panel">
            <div class="lang-selector">
                <select id="sourceLang">
                    <option value="auto">Auto Detect (Urdu/Hindi/English)</option>
                    <option value="ur">Urdu</option>
                    <option value="hi">Hindi</option>
                    <option value="en">English</option>
                </select>
                <span style="font-size:0.8rem;">→ English</span>
                <button id="toggleTranslationBtn" class="btn-translate-toggle">🎤 Start Translation</button>
            </div>
            <div id="translationStatus" class="translation-status">⚪ Translation idle</div>
        </div>

        <!-- Emoji Picker (visibility controlled by coordinator) -->
        <div class="emoji-picker" id="emojiPicker">
            <span class="emoji-btn" onclick="sendEmoji('❤️')">❤️</span>
            <span class="emoji-btn" onclick="sendEmoji('👍')">👍</span>
            <span class="emoji-btn" onclick="sendEmoji('👏')">👏</span>
            <span class="emoji-btn" onclick="sendEmoji('👎')">👎</span>
        </div>

        <div class="message-area">
            <input type="text" id="textInput" placeholder="Submit a query to the hub...">
            <button id="sendTextBtn">Send</button>
        </div>
    </div>

    <div id="pollModal" class="modal">
        <div class="modal-content">
            <h3 id="pollQuestion" style="margin-bottom:20px; color:#fff; font-weight: 800;"></h3>
            <div id="pollOptions"></div>
            <div id="pollResultsBars" style="display:none;" class="poll-container"></div>
            <button class="btn-dismiss" onclick="closeModal('pollModal')">Close Hub</button>
        </div>
    </div>

    <div id="directModal" class="modal">
        <div class="modal-content">
            <h3 id="directQuestion" style="margin-bottom:20px; color:#fff; font-weight: 800;"></h3>
            <input type="text" id="directAnswerInput" placeholder="Type your response..." style="width:100%; padding:15px; margin-bottom:15px; border-radius:25px; background:#0f172a; border:1px solid #334155; color:white; font-size: 0.9rem;">
            <button id="submitDirectBtn" class="btn-request">Submit Response</button>
            <button class="btn-dismiss" onclick="closeModal('directModal')">Dismiss</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let peerConnection = null;
        let localStream = null;
        let currentSpeakerTimer = null;
        let hasVoted = false;

        const urlParams = new URLSearchParams(window.location.search);
        const meetId = urlParams.get('meetId');
        if (!meetId) window.location.href = '/';

        const name = sessionStorage.getItem('joinName') || 'Participant';
        const dept = sessionStorage.getItem('joinDept') || 'General';
        const roll = sessionStorage.getItem('joinRoll') || 'N/A';
        const password = sessionStorage.getItem('joinPassword') || '';
        const socket = io();
        let allowTextGlobal = true, allowVoiceGlobal = true;
        let isActiveSpeaker = false;
        let allowEmojiGlobal = true;   // NEW: track emoji permission
        
        socket.emit('join-room', { meetId, name, dept, roll, password });
        
        socket.on('join-response', (response) => {
            if (!response.success) { alert(response.message); window.location.href = '/'; }
            else {
                document.getElementById('sessionTopicDisplay').innerHTML = `📖 Hub Topic: ${response.sessionTopic}`;
                allowTextGlobal = response.allowText; allowVoiceGlobal = response.allowVoice;
                document.getElementById('textInput').disabled = !allowTextGlobal;
                document.getElementById('requestSpeakBtn').disabled = !allowVoiceGlobal;
            }
        });

        socket.on('update-participant-count', (data) => {
            document.getElementById('pCount').innerText = data.count;
        });
        
        const reqBtn = document.getElementById('requestSpeakBtn');
        reqBtn.onclick = () => {
            if (!allowVoiceGlobal) return;
            socket.emit('raise-hand', { meetId, name, dept, roll });
            reqBtn.innerText = '⏳ Waiting for Approval...';
            reqBtn.disabled = true;
        };

        socket.on('speaker-rejected', () => {
            reqBtn.innerText = '🎙️ Request to Speak';
            reqBtn.disabled = !allowVoiceGlobal;
        });

        socket.on('speaker-allowed', async ({ duration }) => {
            isActiveSpeaker = true;
            document.getElementById('speakerStatus').innerHTML = `<div style="color:#22c55e; font-weight:700;">● LIVE TRANSMISSION</div><div id="speakerTimer" class="timer-display">Ready</div>`;
            startTimer(duration);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true, 
                        autoGainControl: true,
                        sampleRate: 48000,
                        channelCount: 1 
                    }, 
                    video: false 
                });
                
                peerConnection = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
                    ],
                    iceCandidatePoolSize: 10
                });

                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.onicecandidate = (e) => {
                    if (e.candidate) socket.emit('webrtc-ice', { meetId, targetId: 'coordinator', candidate: e.candidate });
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('webrtc-offer', { meetId, targetId: 'coordinator', sdp: peerConnection.localDescription });
            } catch (err) {
                console.error("Mic Error:", err);
            }
        });

        function startTimer(duration) {
            if (currentSpeakerTimer) clearInterval(currentSpeakerTimer);
            const timerDiv = document.getElementById('speakerTimer');
            if (duration === 0) { timerDiv.innerText = "∞ No Limit"; return; }
            let remaining = duration;
            currentSpeakerTimer = setInterval(() => {
                remaining--;
                timerDiv.innerText = `${Math.ceil(remaining)}s left`;
                if (remaining <= 15) timerDiv.classList.add('critical');
                if (remaining <= 0) { clearInterval(currentSpeakerTimer); timerDiv.innerText = 'Offline'; }
            }, 1000);
        }

        socket.on('time-warning', () => { if (navigator.vibrate) navigator.vibrate([300, 100, 300]); });

        socket.on('speaker-revoked', () => {
            isActiveSpeaker = false;
            
            if (currentSpeakerTimer) clearInterval(currentSpeakerTimer);
            document.getElementById('speakerStatus').innerHTML = `<div style="opacity:0.6;">🎤 Speaking Status</div><div id="speakerTimer" class="timer-display">Offline</div>`;
            reqBtn.disabled = !allowVoiceGlobal;
            reqBtn.innerText = '🎙️ Request to Speak';
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            
            // Stop translation when permission is revoked
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            if (translationActive) {
                updateTranslationUI(false);
            }
        });

        socket.on('webrtc-answer', async ({ sdp }) => { if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp)); });
        socket.on('webrtc-ice', async ({ candidate }) => { if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });

        document.getElementById('sendTextBtn').onclick = () => {
            const msg = document.getElementById('textInput').value;
            if (!msg.trim() || !allowTextGlobal) return;
            socket.emit('student-message', { meetId, message: msg, name });
            document.getElementById('textInput').value = '';
        };
        
        window.sendEmoji = (emoji) => { socket.emit('send-emoji', { meetId, emoji }); };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; hasVoted = false; }

        socket.on('poll-received', ({ question, options }) => {
            document.getElementById('pollQuestion').innerText = question;
            const optsDiv = document.getElementById('pollOptions');
            const barsDiv = document.getElementById('pollResultsBars');
            optsDiv.style.display = 'block';
            barsDiv.style.display = 'none';
            optsDiv.innerHTML = options.map(opt => `<button class="poll-option" onclick="submitVote('${opt}')">${opt}</button>`).join('');
            document.getElementById('pollModal').style.display = 'flex';
        });

        window.submitVote = (answer) => {
            socket.emit('submit-poll-response', { meetId, answer, name });
            document.getElementById('pollOptions').style.display = 'none';
            document.getElementById('pollResultsBars').style.display = 'block';
            hasVoted = true;
        };

        socket.on('poll-update-results', ({ yes, no, total }) => {
            if(!hasVoted) return;
            const yesPerc = total > 0 ? (yes / total) * 100 : 0;
            const noPerc = total > 0 ? (no / total) * 100 : 0;
            document.getElementById('pollResultsBars').innerHTML = `
                <div class="poll-bar-row">
                    <div class="poll-info"><span>YES</span><span>${Math.round(yesPerc)}%</span></div>
                    <div class="poll-track"><div class="poll-fill fill-yes" style="width:${yesPerc}%"></div></div>
                </div>
                <div class="poll-bar-row">
                    <div class="poll-info"><span>NO</span><span>${Math.round(noPerc)}%</span></div>
                    <div class="poll-track"><div class="poll-fill fill-no" style="width:${noPerc}%"></div></div>
                </div>
                <p style="font-size:0.8rem; margin-top:10px; color:#94a3b8;">Total Votes: ${total}</p>
            `;
        });

        socket.on('direct-prompt-received', ({ question, promptId }) => {
            document.getElementById('directQuestion').innerText = question;
            document.getElementById('directModal').style.display = 'flex';
            window.currentPromptId = promptId;
        });

        document.getElementById('submitDirectBtn').onclick = () => {
            const answer = document.getElementById('directAnswerInput').value;
            if (!answer.trim()) return;
            socket.emit('submit-direct-answer', { meetId, answer, name, promptId: window.currentPromptId });
            closeModal('directModal');
            document.getElementById('directAnswerInput').value = '';
        };

        socket.on('session-ended', () => { window.location.href = '/'; });
        
        // ========== UPDATED: settings-updated handler now also manages emoji visibility ==========
        socket.on('settings-updated', (data) => {
            allowTextGlobal = data.allowText; allowVoiceGlobal = data.allowVoice;
            document.getElementById('textInput').disabled = !allowTextGlobal;
            reqBtn.disabled = !allowVoiceGlobal;
            
            // Handle emoji permission
            if (data.allowEmoji !== undefined) {
                allowEmojiGlobal = data.allowEmoji;
                const emojiPickerDiv = document.getElementById('emojiPicker');
                if (emojiPickerDiv) {
                    emojiPickerDiv.style.display = allowEmojiGlobal ? 'flex' : 'none';
                }
            }
        });
        // ========== end settings-updated ==========

        // ========== Translation Feature ==========
        let translationActive = false;
        let recognition = null;
        const sourceLangSelect = document.getElementById('sourceLang');
        const toggleBtn = document.getElementById('toggleTranslationBtn');
        const translationStatusDiv = document.getElementById('translationStatus');

        function detectLanguage(text) {
            const lower = text.toLowerCase();
            const englishWords = ['the', 'and', 'is', 'to', 'of', 'a', 'in', 'for', 'on', 'with', 'this', 'that', 'it', 'as', 'be', 'by', 'are', 'from', 'or', 'at', 'an'];
            const urduWords = ['hai', 'hoon', 'aap', 'main', 'mein', 'woh', 'yeh', 'aur', 'kya', 'kyu', 'acha', 'nahi', 'hain', 'tha', 'the', 'kar', 'raha', 'rahi', 'sakta', 'sakti', 'apna', 'tum', 'hum'];
            const hindiWords = ['main', 'tu', 'tum', 'woh', 'yeh', 'aur', 'kya', 'hai', 'hoon', 'nahi', 'hain', 'tha', 'the', 'kar', 'raha', 'rahi', 'sakta', 'sakti', 'apna', 'hum', 'aap'];
            let scoreEn = 0, scoreUr = 0, scoreHi = 0;
            englishWords.forEach(w => { if (lower.includes(w)) scoreEn++; });
            urduWords.forEach(w => { if (lower.includes(w)) scoreUr++; });
            hindiWords.forEach(w => { if (lower.includes(w)) scoreHi++; });
            if (scoreEn > scoreUr && scoreEn > scoreHi) return 'en';
            if (scoreUr > scoreHi) return 'ur';
            if (scoreHi > scoreUr) return 'hi';
            return 'en';
        }

        function updateTranslationUI(isActive) {
            translationActive = isActive;
            if (isActive) {
                toggleBtn.classList.add('active');
                toggleBtn.innerHTML = '🔴 Stop Translation';
                translationStatusDiv.innerHTML = '🎙️ Listening... (speak naturally)';
                translationStatusDiv.classList.add('active');
            } else {
                toggleBtn.classList.remove('active');
                toggleBtn.innerHTML = '🎤 Start Translation';
                translationStatusDiv.innerHTML = '⚪ Translation idle';
                translationStatusDiv.classList.remove('active');
            }
        }

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Your browser does not support speech recognition. Please use Chrome, Edge, or Safari.');
                return false;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            const selected = sourceLangSelect.value;
            if (selected === 'auto') recognition.lang = 'ur-PK';
            else if (selected === 'ur') recognition.lang = 'ur-PK';
            else if (selected === 'hi') recognition.lang = 'hi-IN';
            else recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        let transcript = event.results[i][0].transcript.trim();
                        if (transcript.length === 0) return;
                        let detectedLang = sourceLangSelect.value;
                        if (detectedLang === 'auto') {
                            detectedLang = detectLanguage(transcript);
                            translationStatusDiv.innerHTML = `🎤 (${detectedLang.toUpperCase()}) "${transcript.substring(0, 40)}..." → translating to English...`;
                        } else {
                            translationStatusDiv.innerHTML = `🎤 Captured: "${transcript.substring(0, 40)}..." → translating to English...`;
                        }
                        socket.emit('voice-transcript', { meetId, text: transcript, studentName: name });
                    }
                }
            };
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                translationStatusDiv.innerHTML = `⚠️ Error: ${event.error}. Please check microphone or speak clearly.`;
            };
            recognition.onend = () => {
                if (translationActive) {
                    setTimeout(() => {
                        if (translationActive && recognition) {
                            try { recognition.start(); } catch(e) { console.log("Restart failed", e); }
                        }
                    }, 300);
                }
            };
            return true;
        }

        toggleBtn.onclick = () => {
            if (!allowVoiceGlobal) {
                alert('Voice portal is disabled by the coordinator.');
                return;
            }
            if (!isActiveSpeaker) {
                alert('You are not currently allowed to speak. Request and receive permission from the coordinator first.');
                return;
            }
            if (translationActive) {
                if (recognition) {
                    recognition.stop();
                    recognition = null;
                }
                updateTranslationUI(false);
            } else {
                if (!recognition) {
                    if (!initSpeechRecognition()) return;
                }
                const selected = sourceLangSelect.value;
                if (selected === 'auto') recognition.lang = 'ur-PK';
                else if (selected === 'ur') recognition.lang = 'ur-PK';
                else if (selected === 'hi') recognition.lang = 'hi-IN';
                else recognition.lang = 'en-US';
                recognition.start();
                updateTranslationUI(true);
            }
        };

        sourceLangSelect.addEventListener('change', () => {
            if (translationActive && recognition) {
                const selected = sourceLangSelect.value;
                if (selected === 'auto') recognition.lang = 'ur-PK';
                else if (selected === 'ur') recognition.lang = 'ur-PK';
                else if (selected === 'hi') recognition.lang = 'hi-IN';
                else recognition.lang = 'en-US';
                translationStatusDiv.innerHTML = `🎤 Language preset changed to ${sourceLangSelect.options[sourceLangSelect.selectedIndex].text}`;
            }
        });
    </script>
</body>
</html>
